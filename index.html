<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer FAQ</title>
  <meta
    name="description"
    content="Frequently asked questions about volunteering, presented in an Apple-inspired accordion layout."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are the requirements?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Past attendance at our sessions and alignment with our values"
          }
        },
        {
          "@type": "Question",
          "name": "What is the process?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Application, shadow an existing volunteer at a session, then volunteer"
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to be good at chess?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, there are no ability requirements, except for teaching"
          }
        },
        {
          "@type": "Question",
          "name": "How will I learn my activity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You will learn by shadowing an existing, friendly volunteer at our sessions"
          }
        },
        {
          "@type": "Question",
          "name": "Will you provide me with a reference?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes"
          }
        },
        {
          "@type": "Question",
          "name": "Are there any fees?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No"
          }
        }
      ]
    }
  </script>
</head>
<body>
  <main class="faq-page">
    <section class="faq-shell" aria-labelledby="faq-title">
      <div class="faq-intro">
        <h1 id="faq-title">FAQs</h1>
      </div>

      <div class="faq-list" data-accordion>
        <article class="faq-item">
          <h2 class="faq-heading">
            <button
              class="faq-trigger"
              id="faq-button-1"
              type="button"
              aria-expanded="false"
              aria-controls="faq-panel-1"
            >
              <span class="faq-question">What are the requirements?</span>
              <span class="faq-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M6 9.5 12 15.5 18 9.5"></path>
                </svg>
              </span>
            </button>
          </h2>
          <div
            class="faq-panel"
            id="faq-panel-1"
            role="region"
            aria-labelledby="faq-button-1"
            aria-hidden="true"
          >
            <div class="faq-panel-inner">
              <p>Past attendance at our sessions and alignment with our values</p>
            </div>
          </div>
        </article>

        <article class="faq-item">
          <h2 class="faq-heading">
            <button
              class="faq-trigger"
              id="faq-button-2"
              type="button"
              aria-expanded="false"
              aria-controls="faq-panel-2"
            >

            class="faq-panel"
            id="faq-panel-2"

            aria-labelledby="faq-button-2"
            aria-hidden="true"
          >
            <div class="faq-panel-inner">
              <p>Application, shadow an existing volunteer at a session, then volunteer</p>
            </div>
          </div>
        </article>

        <article class="faq-item">
          <h2 class="faq-heading">
            <button
              class="faq-trigger"
              id="faq-button-3"

              aria-expanded="false"

              <p>Shadowing an existing, friendly volunteer at our sessions</p>

        </article>

            >

                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M6 9.5 12 15.5 18 9.5"></path>
                </svg>
              </span>
            </button>
          </h2>
          <div
            class="faq-panel"
            id="faq-panel-5"
            role="region"
            aria-labelledby="faq-button-5"
            aria-hidden="true"
          >
            <div class="faq-panel-inner">
              <p>Yes</p>
            </div>
          </div>

            <button

            </button>
          </h2>
          <div
            class="faq-panel"
            id="faq-panel-6"
            role="region"

            aria-hidden="true"

            <div class="faq-panel-inner">
              <p>No</p>

    </section>
  </main>

  <script src="script.js"></script>
